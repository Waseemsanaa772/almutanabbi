name: Render Video
on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Setup Node
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Render
        run: npx remotion render src/remotion/index.tsx MyComp out/video.mp4

      - name: Upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: almutanabbi-video
          path: out/video.mp4
