name: Render Video
on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Render
        run: npx remotion render src/remotion/index.ts out/video.mp4

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: almutanabbi-video
          path: out/video.mp4
