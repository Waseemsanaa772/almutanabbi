name: Render Video
on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ecceb3c115ace095d3a9ebc52d3b6d
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Render
        run: npx remotion render src/remotion/index.ts out/video.mp4

      - name: Upload
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: almutanabbi-video
          path: out/video.mp4
