name: Render Video
on:
  workflow_dispatch:
    inputs:
      scene:
        description: 'المشهد المراد رندرته'
        required: true
        default: 'scene1'

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Render Scene
        run: npx remotion render src/remotion/index.ts out/almutanabbi_scene1.mp4 || npx remotion render src/index.ts out/almutanabbi_scene1.mp4

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: almutanabbi-video
          path: out/almutanabbi_scene1.mp4
